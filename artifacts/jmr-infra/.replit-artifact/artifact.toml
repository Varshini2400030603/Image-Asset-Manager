kind = "web"
previewPath = "/"
title = "JMR Infra Developers"
version = "1.0.0"
id = "artifacts/jmr-infra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23444

[services.development]
run = "pnpm --filter @workspace/jmr-infra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jmr-infra", "run", "build" ]
publicDir = "artifacts/jmr-infra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23444"
BASE_PATH = "/"
